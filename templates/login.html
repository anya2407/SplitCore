<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SplitCore</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Welcome back</h2>
    <p>Sign in to your SplitCore account.</p>

    <form method="POST" action="/login">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
    </form>

    <div class="divider" style="margin-top: 24px;"></div>
    <p style="margin-top: 16px; font-size: 0.875rem;">Don't have an account? <a href="/register">Register</a></p>
</div>

</body>
</html>
